<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mini To‑Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1>Ma To‑Do List</h1>
    </header>

    <main class="container">
      <form id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="Ajouter une tâche..."
          autocomplete="on"
        />
        <button type="submit">Ajouter</button>
      </form>

      <ul id="todo-list">
        <!-- Les tâches seront ajoutées ici en JS -->
      </ul>
    </main>

    <footer class="footer">
      <p>© 2026 - Sacha G. Photographe</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
