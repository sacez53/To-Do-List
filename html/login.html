<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Connexion — To‑Do List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#080808" />
    <link rel="icon" href="../logo/Check-green.svg.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg:#080808; --surface:#0f0f0f; --line:#1e1e1e; --line-strong:#2e2e2e;
        --text:#efefef;
        /* #9a9a9a sur #080808 ≈ 5.6:1 WCAG AA ✓ */
        --text-muted:#9a9a9a;
        /* #6e6e6e sur #080808 ≈ 4.6:1 WCAG AA ✓ */
        --text-faint:#6e6e6e;
        --white:#fff; --black:#000; --radius:3px; --tr:160ms ease;
      }
      *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; font-family:"IBM Plex Mono","Courier New",monospace; }
      html { color-scheme:dark; -webkit-text-size-adjust:100%; -webkit-tap-highlight-color:transparent; }

      body {
        min-height:100vh; min-height:100dvh;
        display:flex; flex-direction:column;
        background:var(--bg); color:var(--text);
        background-image:radial-gradient(circle,#161616 1px,transparent 1px);
        background-size:22px 22px;
      }

      /* ── Top bar ── */
      .top-bar {
        display:flex; align-items:center; justify-content:space-between;
        padding:.875rem 1.25rem;
        border-bottom:1px solid var(--line);
      }
      .top-logo { font-size:.78rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; }
      .top-logo:hover { color:var(--text); }
      .top-back { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); text-decoration:none; transition:color var(--tr); }
      .top-back:hover { color:var(--white); }

      /* ── Zone centrale ── */
      .wrap {
        flex:1; display:flex; align-items:center; justify-content:center;
        padding:1.5rem 1rem;
        padding-bottom:max(1.5rem, env(safe-area-inset-bottom));
      }

      /* ── Carte ── */
      .card {
        width:100%; max-width:360px;
        display:flex; flex-direction:column;
        animation:appear 360ms ease both;
      }
      @keyframes appear { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

      /* ── Entête de carte ── */
      .card-header { text-align:center; margin-bottom:1.75rem; }
      .card-icon {
        display:inline-flex; align-items:center; justify-content:center;
        width:48px; height:48px;
        border:1px solid #222; margin-bottom:1rem; font-size:1.2rem; position:relative;
      }
      .card-icon::before { content:""; position:absolute; inset:4px; border:1px solid #1a1a1a; }
      .card-title { font-size:.95rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; margin-bottom:.3rem; }
      .card-sub   { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--text-muted); }

      /* ── Onglets ── */
      .tabs {
        display:grid; grid-template-columns:1fr 1fr;
        border:1px solid var(--line-strong);
        border-bottom:none;
        margin-bottom:0;
      }
      .tab-btn {
        padding:.7rem .5rem;
        background:transparent;
        border:none;
        border-bottom:1px solid var(--line-strong);
        color:var(--text-muted);
        font-size:.75rem; font-weight:700;
        text-transform:uppercase; letter-spacing:.08em;
        cursor:pointer;
        transition:color var(--tr), background var(--tr), border-color var(--tr);
      }
      .tab-btn:first-child { border-right:1px solid var(--line-strong); }
      .tab-btn.active {
        color:var(--white);
        background:var(--surface);
        border-bottom-color:var(--surface);
      }
      .tab-btn:not(.active):hover { color:var(--text); }

      /* ── Formulaire ── */
      .auth-form {
        display:none; flex-direction:column; gap:0;
        border:1px solid var(--line-strong);
        border-top:none;
        background:var(--surface);
        position:relative;
      }
      .auth-form.active { display:flex; }

      /* Reflet haut */
      .auth-form::before {
        content:""; position:absolute; top:0; left:1.25rem; right:1.25rem; height:1px;
        background:linear-gradient(to right, transparent, rgba(255,255,255,.07), transparent);
      }

      .form-inner { padding:1.25rem 1.1rem; display:flex; flex-direction:column; gap:.75rem; }

      /* ── Field ── */
      .field { display:flex; flex-direction:column; gap:.3rem; }
      .field label { font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-muted); }

      .input-wrap { position:relative; }
      .input-wrap input {
        width:100%; min-height:48px;
        padding:.85rem 2.75rem .85rem .9rem;
        border:1px solid #1e1e1e; border-radius:var(--radius);
        background:#000; color:var(--text); font-size:16px;
        transition:border-color var(--tr), box-shadow var(--tr);
      }
      .input-wrap input::placeholder { color:var(--text-faint); }
      .input-wrap input:focus { outline:none; border-color:#fff; box-shadow:0 0 0 1px rgba(255,255,255,.05); }
      .input-wrap input.error { border-color:#666; }

      /* Icône dans input */
      .input-icon {
        position:absolute; right:.75rem; top:50%; transform:translateY(-50%);
        color:var(--text-muted); font-size:.75rem; line-height:1; pointer-events:none;
      }

      /* Toggle visibilité mdp */
      .toggle-vis {
        position:absolute; right:.75rem; top:50%; transform:translateY(-50%);
        background:none; border:none; color:var(--text-muted); cursor:pointer;
        font-size:.68rem; letter-spacing:.04em; text-transform:uppercase;
        padding:.25rem; min-height:30px;
        transition:color var(--tr);
      }
      .toggle-vis:hover { color:#fff; }

      /* Règles de validation */
      .rules {
        font-size:.68rem; color:var(--text-muted); letter-spacing:.04em;
        line-height:1.6; padding:.5rem .75rem;
        border:1px solid var(--line-strong); background:#090909; border-radius:var(--radius);
        display:none;
      }
      .rules.visible { display:block; }

      /* ── Bouton submit ── */
      .submit-btn {
        width:100%; min-height:52px;
        padding:.9rem 1rem;
        border:none; border-top:1px solid #1a1a1a;
        background:#fff; color:#000;
        font-size:.82rem; font-weight:700;
        text-transform:uppercase; letter-spacing:.1em;
        cursor:pointer;
        position:relative; overflow:hidden;
        transition:background var(--tr), color var(--tr), opacity var(--tr);
      }
      .submit-btn:hover { background:#000; color:#fff; }
      .submit-btn:disabled { opacity:.4; cursor:not-allowed; }
      .submit-btn::after {
        content:"→"; position:absolute; right:1.1rem; top:50%; transform:translateY(-50%);
        opacity:0; transition:opacity var(--tr), right var(--tr);
      }
      .submit-btn:not(:disabled):hover::after { opacity:1; right:.9rem; }

      /* ── Messages ── */
      .msg {
        font-size:.72rem; text-transform:uppercase; letter-spacing:.06em;
        text-align:center; padding:.65rem .875rem;
        border:1px solid var(--line-strong); border-top:none;
        background:#0a0a0a; display:none;
      }
      .msg.error.visible   { display:block; color:#aaaaaa; animation:shake 280ms ease; }
      .msg.success.visible { display:block; color:var(--text-muted); }

      @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

      /* ── Hint bas ── */
      .hint { margin-top:1.25rem; text-align:center; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); }

      /* Footer */
      footer { text-align:center; padding:.875rem; border-top:1px solid var(--line); font-size:.72rem; color:var(--text-muted); letter-spacing:.04em; }

      /* Petits écrans */
      @media(max-height:600px) {
        .card-header { margin-bottom:1rem; }
        .card-icon { display:none; }
        .wrap { padding:.75rem 1rem; }
      }
    </style>
  </head>
  <body>

    <div class="top-bar">
      <a class="top-logo" href="../index.html">To‑Do List</a>
      <a class="top-back" href="../index.html">← Accueil</a>
    </div>

    <div class="wrap">
      <div class="card">

        <!-- En-tête -->
        <div class="card-header">
          <div class="card-icon" aria-hidden="true">✓</div>
          <p class="card-title">Mon espace</p>
          <p class="card-sub">Connexion ou inscription</p>
        </div>

        <!-- Onglets -->
        <div class="tabs" role="tablist">
          <button class="tab-btn active" id="tab-login"    role="tab" aria-selected="true"  aria-controls="form-login">Connexion</button>
          <button class="tab-btn"        id="tab-register" role="tab" aria-selected="false" aria-controls="form-register">Créer un compte</button>
        </div>

        <!-- ═══ FORMULAIRE CONNEXION ═══ -->
        <form class="auth-form active" id="form-login" role="tabpanel" autocomplete="off" novalidate>
          <div class="form-inner">

            <div class="field">
              <label for="login-user">Identifiant</label>
              <div class="input-wrap">
                <input type="text" id="login-user" placeholder="votre_identifiant" autocomplete="username" inputmode="text" />
                <span class="input-icon">@</span>
              </div>
            </div>

            <div class="field">
              <label for="login-pass">Mot de passe</label>
              <div class="input-wrap">
                <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="toggle-vis" id="toggle-login-pass" tabindex="-1">voir</button>
              </div>
            </div>

          </div>
          <button type="submit" class="submit-btn" id="login-btn">Se connecter</button>
        </form>
        <div class="msg error" id="login-error"></div>

        <!-- ═══ FORMULAIRE INSCRIPTION ═══ -->
        <form class="auth-form" id="form-register" role="tabpanel" autocomplete="off" novalidate>
          <div class="form-inner">

            <div class="field">
              <label for="reg-user">Identifiant</label>
              <div class="input-wrap">
                <input type="text" id="reg-user" placeholder="votre_identifiant" autocomplete="username" inputmode="text" />
                <span class="input-icon">@</span>
              </div>
              <div class="rules" id="user-rules">
                3 à 20 caractères · lettres, chiffres, _ et - uniquement
              </div>
            </div>

            <div class="field">
              <label for="reg-pass">Mot de passe</label>
              <div class="input-wrap">
                <input type="password" id="reg-pass" placeholder="min. 6 caractères" autocomplete="new-password" />
                <button type="button" class="toggle-vis" id="toggle-reg-pass" tabindex="-1">voir</button>
              </div>
            </div>

            <div class="field">
              <label for="reg-confirm">Confirmer le mot de passe</label>
              <div class="input-wrap">
                <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password" />
                <button type="button" class="toggle-vis" id="toggle-reg-confirm" tabindex="-1">voir</button>
              </div>
            </div>

          </div>
          <button type="submit" class="submit-btn" id="register-btn">Créer mon compte</button>
        </form>
        <div class="msg error"   id="register-error"></div>
        <div class="msg success" id="register-success"></div>

        <p class="hint">Chaque compte dispose de ses propres tâches</p>
      </div>
    </div>

    <footer>© 2026 · Sacha G.</footer>

    <script src="../script/crypto.js"></script>
    <script src="../script/login.js"></script>
    <script>
      // ── Onglets ──
      const tabLogin    = document.getElementById("tab-login");
      const tabRegister = document.getElementById("tab-register");
      const formLogin   = document.getElementById("form-login");
      const formRegister= document.getElementById("form-register");

      function switchTab(active) {
        const isLogin = active === "login";
        tabLogin.classList.toggle("active", isLogin);
        tabRegister.classList.toggle("active", !isLogin);
        formLogin.classList.toggle("active", isLogin);
        formRegister.classList.toggle("active", !isLogin);
        tabLogin.setAttribute("aria-selected", isLogin);
        tabRegister.setAttribute("aria-selected", !isLogin);
      }

      tabLogin.addEventListener("click",    () => switchTab("login"));
      tabRegister.addEventListener("click", () => switchTab("register"));

      // ── Toggle visibilité mots de passe ──
      function togglePass(btnId, inputId) {
        const btn   = document.getElementById(btnId);
        const field = document.getElementById(inputId);
        btn.addEventListener("click", () => {
          const isPass = field.type === "password";
          field.type = isPass ? "text" : "password";
          btn.textContent = isPass ? "cacher" : "voir";
        });
      }
      togglePass("toggle-login-pass",   "login-pass");
      togglePass("toggle-reg-pass",     "reg-pass");
      togglePass("toggle-reg-confirm",  "reg-confirm");

      // ── Règles identifiant ──
      document.getElementById("reg-user").addEventListener("focus", () => {
        document.getElementById("user-rules").classList.add("visible");
      });
      document.getElementById("reg-user").addEventListener("blur", () => {
        document.getElementById("user-rules").classList.remove("visible");
      });
    </script>
  </body>
</html>
